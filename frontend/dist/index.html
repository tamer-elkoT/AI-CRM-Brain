<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI CRM Brain</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script type="module" crossorigin src="/assets/index-Bn6pxYBr.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Dvq_aufk.css">
  </head>
  <body class="bg-background min-h-screen text-on-surface antialiased overflow-hidden">
    <div id="root"></div>
    <div id="error-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.9); color: white; padding: 20px; z-index: 9999; font-family: monospace; white-space: pre-wrap; overflow: auto;"></div>
    <script>
      window.addEventListener('error', function(event) {
        const overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.innerHTML += 'Global Error: ' + event.message + '\n' + (event.error && event.error.stack ? event.error.stack : '') + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(event) {
        const overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.innerHTML += 'Unhandled Promise Rejection: ' + (event.reason && event.reason.message ? event.reason.message : event.reason) + '\n' + (event.reason && event.reason.stack ? event.reason.stack : '') + '\n\n';
      });
    </script>
  </body>
</html>
