# ─────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Rabih CRM Production Stack
#
# Services:
#   db                → PostgreSQL 16 (data layer)
#   api               → FastAPI / Uvicorn (backend)
#   frontend          → React / Nginx (UI)
#   whatsapp_service  → Baileys Node.js (WhatsApp bridge)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
# ─────────────────────────────────────────────────────────────

services:

  # ══════════════════════════════════════════════════════════
  # 1. Database — PostgreSQL 16
  # ══════════════════════════════════════════════════════════
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tamerelkot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-T365t14}
      POSTGRES_DB: ${DB_NAME:-ai_crm_brain}
    ports:
      - "5433:5432"
    volumes:
      # Named volume → data survives container deletion
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tamerelkot} -d ${DB_NAME:-ai_crm_brain}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ══════════════════════════════════════════════════════════
  # 2. API — FastAPI / Uvicorn
  # ══════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB connection for Docker networking.
      # Inside Docker, the db is reachable by its service name on the internal port.
      DB_HOST: db
      DB_PORT: "5432"
    ports:
      - "8000:8000"
    volumes:
      # Persist ML model files and generated artifacts between deploys
      - ./artifacts:/app/artifacts
      - ./weights:/app/weights
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ══════════════════════════════════════════════════════════
  # 3. Frontend — React built by Vite, served by Nginx
  # ══════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════
  # 4. WhatsApp Microservice — Baileys / Node.js
  # ══════════════════════════════════════════════════════════
  whatsapp_service:
    build:
      context: ./whatsapp-microservice
      dockerfile: Dockerfile.whatsapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # CRITICAL: Mount session directory so the QR-code auth
      # is preserved when the container restarts.
      - ./whatsapp-microservice/auth_sessions:/app/auth_sessions
    depends_on:
      - api

# ══════════════════════════════════════════════════════════
# Named Volumes
# ══════════════════════════════════════════════════════════
volumes:
  pgdata:
    driver: local
