<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1060" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <linearGradient id="stepBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="stepGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="stepPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="stepAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="stepRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="stepTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="stepEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1060" fill="url(#bg)" rx="16"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="1060" fill="url(#grid)" rx="16" opacity="0.3"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">👔 Sales Manager — User Flow</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-size="11">From Login to Executing an AI-Recommended Action</text>

  <!-- Timeline line -->
  <line x1="450" y1="90" x2="450" y2="1010" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ───────────────────────────────────────────── -->
  <!-- STEP 1: Login -->
  <rect x="240" y="94" width="420" height="74" rx="10" fill="url(#stepBlue)" filter="url(#shadow)"/>
  <text x="450" y="120" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">STEP 1 — Login</text>
  <text x="450" y="140" text-anchor="middle" fill="#bfdbfe" font-size="11">Navigate to React App (localhost:5173)</text>
  <text x="450" y="156" text-anchor="middle" fill="#bfdbfe" font-size="10">Email/Password  ·  Google OAuth SSO  ·  Receives JWT Token (30-day)</text>

  <!-- Connector -->
  <line x1="450" y1="168" x2="450" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 2: Dashboard loads -->
  <rect x="240" y="192" width="420" height="74" rx="10" fill="url(#stepGreen)" filter="url(#shadow)"/>
  <text x="450" y="218" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">STEP 2 — Dashboard Loads</text>
  <text x="450" y="238" text-anchor="middle" fill="#a7f3d0" font-size="11">React calls GET /api/v1/deals (Axios + JWT header)</text>
  <text x="450" y="254" text-anchor="middle" fill="#a7f3d0" font-size="10">Ranked deal list renders • KPI cards: Total | High Priority | Avg Score</text>

  <!-- Connector -->
  <line x1="450" y1="266" x2="450" y2="288" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 3: Click Sync Now -->
  <rect x="240" y="290" width="420" height="88" rx="10" fill="url(#stepAmber)" filter="url(#shadow)"/>
  <text x="450" y="316" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">STEP 3 — Click "Sync Now"</text>
  <text x="450" y="336" text-anchor="middle" fill="#fef3c7" font-size="11">POST /api/v1/ingest/deals  →  Zoho OAuth token refresh</text>
  <text x="450" y="352" text-anchor="middle" fill="#fef3c7" font-size="10">Fetch all active deals from Zoho CRM API v3</text>
  <text x="450" y="368" text-anchor="middle" fill="#fef3c7" font-size="10">Enrich with Contact phone/email  →  Upsert PostgreSQL  →  Auto-classify deals</text>

  <!-- Connector -->
  <line x1="450" y1="378" x2="450" y2="400" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 4: Generate AI Recommendations -->
  <rect x="240" y="402" width="420" height="100" rx="10" fill="url(#stepPurple)" filter="url(#shadow)"/>
  <text x="450" y="428" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">STEP 4 — AI Pipeline Runs</text>
  <text x="450" y="448" text-anchor="middle" fill="#c4b5fd" font-size="11">POST /api/v1/recommendations/generate</text>
  <text x="450" y="464" text-anchor="middle" fill="#c4b5fd" font-size="10">🔵 Random Forest → base_probability per deal</text>
  <text x="450" y="480" text-anchor="middle" fill="#c4b5fd" font-size="10">🟣 data_fusion() → LLM prompt built (deal data + custom fields)</text>
  <text x="450" y="496" text-anchor="middle" fill="#c4b5fd" font-size="10">🤖 Groq LLM → adjusted_probability + recommendation_ar + recommendation_en + risk_flag</text>

  <!-- Connector -->
  <line x1="450" y1="502" x2="450" y2="524" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 5: View Ranked Deals -->
  <rect x="240" y="526" width="420" height="74" rx="10" fill="url(#stepTeal)" filter="url(#shadow)"/>
  <text x="450" y="552" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">STEP 5 — View Ranked Deal List</text>
  <text x="450" y="572" text-anchor="middle" fill="#cffafe" font-size="11">Dashboard refreshes automatically</text>
  <text x="450" y="588" text-anchor="middle" fill="#cffafe" font-size="10">Deals sorted by AI Score (%) • Tier badges: 🔴 HIGH / 🟡 MEDIUM / 🟢 LOW • Risk flags shown</text>

  <!-- Connector -->
  <line x1="450" y1="600" x2="450" y2="622" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 6: Click Deal Row -->
  <rect x="240" y="624" width="420" height="88" rx="10" fill="url(#stepGreen)" filter="url(#shadow)"/>
  <text x="450" y="650" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">STEP 6 — Click a Deal Row</text>
  <text x="450" y="670" text-anchor="middle" fill="#a7f3d0" font-size="11">Detail drawer slides in (no page reload)</text>
  <text x="450" y="686" text-anchor="middle" fill="#a7f3d0" font-size="10">Shows: ML Score | AI Score | Δ Delta badge</text>
  <text x="450" y="702" text-anchor="middle" fill="#a7f3d0" font-size="10">Arabic recommendation (RTL) + English mirror + Risk reasoning</text>

  <!-- Connector -->
  <line x1="450" y1="712" x2="450" y2="734" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 7: Click Follow Up -->
  <rect x="240" y="736" width="420" height="100" rx="10" fill="url(#stepRed)" filter="url(#shadow)"/>
  <text x="450" y="762" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">STEP 7 — Click "Follow Up" Button</text>
  <text x="450" y="782" text-anchor="middle" fill="#fecaca" font-size="11">POST /api/v1/followups/{deal_id}/generate-message</text>
  <text x="450" y="798" text-anchor="middle" fill="#fecaca" font-size="10">🔴 Grok LLM generates personalized WhatsApp message (primary)</text>
  <text x="450" y="814" text-anchor="middle" fill="#fecaca" font-size="10">🟠 Groq fallback if Grok fails</text>
  <text x="450" y="830" text-anchor="middle" fill="#fecaca" font-size="10">📱 POST /followups/{deal_id}/send-alert → pywhatkit sends to rep's verified WhatsApp</text>

  <!-- Connector -->
  <line x1="450" y1="836" x2="450" y2="858" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 8: Mark as Done -->
  <rect x="240" y="860" width="420" height="74" rx="10" fill="url(#stepEmerald)" filter="url(#shadow)"/>
  <text x="450" y="886" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">STEP 8 — Mark as Followed Up</text>
  <text x="450" y="906" text-anchor="middle" fill="#a7f3d0" font-size="11">POST /api/v1/followups/{deal_id}/mark</text>
  <text x="450" y="922" text-anchor="middle" fill="#a7f3d0" font-size="10">Records FollowupLog • Updates deal.action_status = "followed_up" • Closes feedback loop</text>

  <!-- Connector -->
  <line x1="450" y1="934" x2="450" y2="956" stroke="#34d399" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- FINAL: System captures data -->
  <rect x="270" y="958" width="360" height="56" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="982" text-anchor="middle" fill="#10b981" font-size="13" font-weight="700">✅ Deal Cycle Complete</text>
  <text x="450" y="1002" text-anchor="middle" fill="#4ade80" font-size="10">rep_action_taken logged • Follow-up history recorded • Score delta preserved for model retraining</text>

  <!-- LEFT sidebar labels -->
  <text x="50" y="134" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">AUTH</text>
  <text x="50" y="232" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">VIEW</text>
  <text x="50" y="340" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">INGEST</text>
  <text x="50" y="458" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">AI</text>
  <text x="50" y="570" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">VIEW</text>
  <text x="50" y="670" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">DETAIL</text>
  <text x="50" y="790" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">ACTION</text>
  <text x="50" y="900" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">CLOSE</text>

  <!-- Left vertical bracket lines -->
  <rect x="68" y="94" width="3" height="74" rx="2" fill="#2563eb" opacity="0.6"/>
  <rect x="68" y="192" width="3" height="74" rx="2" fill="#059669" opacity="0.6"/>
  <rect x="68" y="290" width="3" height="88" rx="2" fill="#d97706" opacity="0.6"/>
  <rect x="68" y="402" width="3" height="100" rx="2" fill="#7c3aed" opacity="0.6"/>
  <rect x="68" y="526" width="3" height="74" rx="2" fill="#0891b2" opacity="0.6"/>
  <rect x="68" y="624" width="3" height="88" rx="2" fill="#059669" opacity="0.6"/>
  <rect x="68" y="736" width="3" height="100" rx="2" fill="#dc2626" opacity="0.6"/>
  <rect x="68" y="860" width="3" height="74" rx="2" fill="#10b981" opacity="0.6"/>

  <!-- Footer -->
  <text x="450" y="1042" text-anchor="middle" fill="#1e293b" font-size="10">AI CRM Brain — MVP v1.0  ·  FastAPI + React  ·  Groq LLM (Llama 3.3 70B)  ·  Random Forest Classifier</text>
</svg>
