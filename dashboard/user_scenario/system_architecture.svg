  <text x="600" y="585" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">🔄 End-to-End Data Flow Pipeline</text>

  <!-- Flow Steps -->
  <rect x="55" y="605" width="150" height="55" rx="8" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <text x="130" y="628" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">1️⃣ INGEST</text>
  <text x="130" y="647" text-anchor="middle" fill="#bfdbfe" font-size="9">Zoho API / CSV Upload</text>

  <line x1="205" y1="632" x2="243" y2="632" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="245" y="605" width="150" height="55" rx="8" fill="url(#nodeAmber)" filter="url(#shadow)"/>
  <text x="320" y="628" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">2️⃣ STORE</text>
  <text x="320" y="647" text-anchor="middle" fill="#fef3c7" font-size="9">PostgreSQL (Upsert)</text>

  <line x1="395" y1="632" x2="433" y2="632" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <rect x="435" y="605" width="150" height="55" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="510" y="628" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">3️⃣ PREDICT</text>
  <text x="510" y="647" text-anchor="middle" fill="#a7f3d0" font-size="9">Random Forest (93.6%)</text>

  <line x1="585" y1="632" x2="623" y2="632" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="625" y="605" width="160" height="55" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="705" y="628" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">4️⃣ RECOMMEND</text>
  <text x="705" y="647" text-anchor="middle" fill="#c4b5fd" font-size="9">LLM Agent (AR/EN)</text>

  <line x1="785" y1="632" x2="823" y2="632" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <rect x="825" y="605" width="150" height="55" rx="8" fill="url(#nodeRed)" filter="url(#shadow)"/>
  <text x="900" y="628" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">5️⃣ NOTIFY</text>
  <text x="900" y="647" text-anchor="middle" fill="#fecaca" font-size="9">WhatsApp + Dashboard</text>

  <line x1="990" y1="632" x2="1028" y2="632" stroke="#f87171" stroke-width="2" marker-end="url(#arrowRed)"/>

  <rect x="1030" y="605" width="120" height="55" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="1090" y="628" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">6️⃣ ACT</text>
  <text x="1090" y="647" text-anchor="middle" fill="#c4b5fd" font-size="9">Sales Rep Action</text>

  <!-- Legend items -->
  <rect x="55" y="685" width="16" height="16" rx="4" fill="url(#nodeBlue)"/>
  <text x="80" y="698" fill="#94a3b8" font-size="11">Ingestion Layer</text>

  <rect x="220" y="685" width="16" height="16" rx="4" fill="url(#nodeGreen)"/>
  <text x="245" y="698" fill="#94a3b8" font-size="11">ML / AI Layer</text>

  <rect x="380" y="685" width="16" height="16" rx="4" fill="url(#nodeAmber)"/>
  <text x="405" y="698" fill="#94a3b8" font-size="11">Data / Dashboard</text>

  <rect x="560" y="685" width="16" height="16" rx="4" fill="url(#nodePurple)"/>
  <text x="585" y="698" fill="#94a3b8" font-size="11">LLM / Frontend</text>

  <rect x="730" y="685" width="16" height="16" rx="4" fill="url(#nodeRed)"/>
  <text x="755" y="698" fill="#94a3b8" font-size="11">Alerts / Actions</text>

  <!-- Key Metrics -->
  <rect x="55" y="720" width="1100" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="130" y="745" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">📊 93.6%</text>
  <text x="130" y="763" text-anchor="middle" fill="#64748b" font-size="9">ML Accuracy</text>

  <text x="320" y="745" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">🧠 Llama 3.3 70B</text>
  <text x="320" y="763" text-anchor="middle" fill="#64748b" font-size="9">LLM Model (via Groq)</text>

  <text x="510" y="745" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">🐘 PostgreSQL 16</text>
  <text x="510" y="763" text-anchor="middle" fill="#64748b" font-size="9">+ JSONB Custom Fields</text>

  <text x="700" y="745" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600">⚛️ React 18 + TS</text>
  <text x="700" y="763" text-anchor="middle" fill="#64748b" font-size="9">Vite + TailwindCSS</text>

  <text x="890" y="745" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600">📱 WhatsApp Alerts</text>
  <text x="890" y="763" text-anchor="middle" fill="#64748b" font-size="9">Risk + Hot Lead Triggers</text>

  <text x="1070" y="745" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="600">🌍 AR / EN</text>
  <text x="1070" y="763" text-anchor="middle" fill="#64748b" font-size="9">Bilingual AI Output</text>
</svg>
