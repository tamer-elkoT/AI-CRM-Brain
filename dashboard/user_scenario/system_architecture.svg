  <!-- Background -->
  <rect width="1200" height="820" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">AI CRM Brain — System Architecture &amp; Data Flow</text>

  <!-- ═══ EXTERNAL SERVICES BOX ═══ -->
  <rect x="30" y="60" width="1140" height="100" rx="12" fill="url(#extGrad)" stroke="#3b82f6" stroke-width="1.5" opacity="0.9" filter="url(#shadow)"/>
  <text x="50" y="85" fill="#93c5fd" font-size="13" font-weight="600">☁️  EXTERNAL SERVICES</text>
  <!-- Zoho -->
  <rect x="50" y="96" width="175" height="48" rx="8" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <text x="137" y="124" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🔗 Zoho CRM API v3</text>
  <!-- Groq -->
  <rect x="255" y="96" width="200" height="48" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="355" y="124" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🧠 Groq API (Llama 3.3 70B)</text>
  <!-- Google -->
  <rect x="485" y="96" width="175" height="48" rx="8" fill="url(#nodeAmber)" filter="url(#shadow)"/>
  <text x="572" y="124" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🔐 Google OAuth 2.0</text>
  <!-- WhatsApp -->
  <rect x="690" y="96" width="200" height="48" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="790" y="124" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">📱 WhatsApp API (Twilio)</text>
  <!-- CSV -->
  <rect x="920" y="96" width="175" height="48" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="1007" y="124" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">📄 CSV / XLSX Upload</text>

  <!-- ═══ FASTAPI BACKEND BOX ═══ -->
  <rect x="30" y="185" width="780" height="345" rx="12" fill="url(#backGrad)" stroke="#10b981" stroke-width="1.5" opacity="0.9" filter="url(#shadow)"/>
  <text x="50" y="210" fill="#6ee7b7" font-size="13" font-weight="600">⚙️  FASTAPI BACKEND (Port 8000)</text>

  <!-- Ingestion Controller -->
  <rect x="50" y="225" width="220" height="52" rx="8" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <text x="160" y="247" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">📥 Ingestion Controller</text>
  <text x="160" y="264" text-anchor="middle" fill="#bfdbfe" font-size="9">OAuth Refresh → Fetch → Upsert</text>

  <!-- ML Controller -->
  <rect x="50" y="295" width="220" height="52" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="160" y="317" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🤖 ML Controller</text>
  <text x="160" y="334" text-anchor="middle" fill="#a7f3d0" font-size="9">Preprocess → Random Forest → Predict</text>

  <!-- Recommendation Controller -->
  <rect x="50" y="365" width="220" height="52" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="160" y="387" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🧠 Recommendation Controller</text>
  <text x="160" y="404" text-anchor="middle" fill="#c4b5fd" font-size="9">Data Fusion → LLM → Validate → Store</text>

  <!-- Dashboard Controller -->
  <rect x="310" y="225" width="220" height="52" rx="8" fill="url(#nodeAmber)" filter="url(#shadow)"/>
  <text x="420" y="247" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">📊 Dashboard Controller</text>
  <text x="420" y="264" text-anchor="middle" fill="#fde68a" font-size="9">KPIs, Rankings, Deal Detail</text>

  <!-- Auth Controller -->
  <rect x="310" y="295" width="220" height="52" rx="8" fill="url(#nodeAmber)" filter="url(#shadow)"/>
  <text x="420" y="317" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🔐 Auth Controller</text>
  <text x="420" y="334" text-anchor="middle" fill="#fde68a" font-size="9">JWT, OTP, Google SSO</text>

  <!-- Action Controller -->
  <rect x="310" y="365" width="220" height="52" rx="8" fill="url(#nodeRed)" filter="url(#shadow)"/>
  <text x="420" y="387" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">⚡ Action Controller</text>
  <text x="420" y="404" text-anchor="middle" fill="#fecaca" font-size="9">Actioned, Escalate, Full Sync</text>

  <!-- Notification Service -->
  <rect x="570" y="225" width="220" height="52" rx="8" fill="url(#nodeRed)" filter="url(#shadow)"/>
  <text x="680" y="247" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🔔 Notification Service</text>
  <text x="680" y="264" text-anchor="middle" fill="#fecaca" font-size="9">WhatsApp OTP + Deal Alerts</text>

  <!-- ML Engine (inside backend) -->
  <rect x="570" y="295" width="220" height="52" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="680" y="317" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">⚙️ ML Engine</text>
  <text x="680" y="334" text-anchor="middle" fill="#a7f3d0" font-size="9">inference.py + data_fusion.py</text>

  <!-- AI Agents (inside backend) -->
  <rect x="570" y="365" width="220" height="52" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="680" y="387" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🤖 AI Agents</text>
  <text x="680" y="404" text-anchor="middle" fill="#c4b5fd" font-size="9">recommender.py + prompts.py</text>

