  <text x="1005" y="249" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🐘 PostgreSQL 16 (Port 5433)</text>
  <text x="1005" y="268" text-anchor="middle" fill="#fef3c7" font-size="9">Users · ZohoDeals · MLPredictions · LLMRecommendations</text>

  <!-- ML Artifacts -->
  <rect x="860" y="300" width="290" height="55" rx="8" fill="url(#nodeAmber)" filter="url(#shadow)"/>
  <text x="1005" y="324" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📦 ML Artifacts</text>
  <text x="1005" y="343" text-anchor="middle" fill="#fef3c7" font-size="9">random_forest_v1.pkl · StandardScaler · Encoders</text>

  <!-- ═══ FRONTEND BOX ═══ -->
  <rect x="840" y="410" width="330" height="120" rx="12" fill="url(#feGrad)" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9" filter="url(#shadow)"/>
  <text x="860" y="435" fill="#c4b5fd" font-size="13" font-weight="600">⚛️  REACT FRONTEND (Port 5173)</text>

  <rect x="860" y="448" width="290" height="65" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="1005" y="472" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🖥️ React 18 + TypeScript</text>
  <text x="1005" y="491" text-anchor="middle" fill="#ddd6fe" font-size="9">TailwindCSS · Recharts · TanStack Query · React Router</text>
  <text x="1005" y="505" text-anchor="middle" fill="#ddd6fe" font-size="9">Auth · Home · Dashboard · Settings · Integrations</text>

  <!-- ═══ ARROWS ═══ -->
  <!-- Zoho → Ingestion -->
  <line x1="137" y1="144" x2="137" y2="225" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="145" y="190" fill="#93c5fd" font-size="9">REST + OAuth</text>

  <!-- CSV → Ingestion -->
  <path d="M 1007 144 L 1007 175 Q 1007 185 997 185 L 270 185 Q 260 185 260 195 L 260 225" stroke="#a78bfa" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)" stroke-dasharray="5,3"/>

  <!-- Ingestion → DB -->
  <line x1="270" y1="251" x2="860" y2="251" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="560" y="244" fill="#93c5fd" font-size="9">Upsert Deals</text>

  <!-- DB → ML Controller -->
  <path d="M 860 265 L 310 265 Q 300 265 300 275 L 300 295" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="580" y="280" fill="#6ee7b7" font-size="9">Read Deals</text>

  <!-- ML Controller → ML Engine -->
  <line x1="270" y1="321" x2="570" y2="321" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="400" y="315" fill="#6ee7b7" font-size="9">Preprocess + Predict</text>

  <!-- ML Engine → ML Artifacts -->
  <line x1="790" y1="321" x2="860" y2="327" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <!-- ML Controller → DB (store predictions) -->
  <path d="M 270 340 L 280 340 Q 290 340 290 350 L 290 380 Q 290 390 300 390 L 830 390 Q 840 390 850 380 L 850 280 Q 860 270 870 270" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>

  <!-- DB → Rec Controller -->
  <path d="M 860 275 L 310 275 Q 290 275 290 290 L 290 355 Q 290 365 280 365 L 270 370" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- Rec Controller → AI Agents -->
  <line x1="270" y1="391" x2="570" y2="391" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="400" y="385" fill="#c4b5fd" font-size="9">Generate Recommendation</text>

  <!-- AI Agents → Groq -->
  <path d="M 680 365 L 680 180 Q 680 170 670 170 L 380 170 Q 370 170 360 160 L 355 144" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="690" y="178" fill="#6ee7b7" font-size="9">LLM API Call</text>

  <!-- Rec Controller → Notification (urgent deals) -->
  <path d="M 260 365 L 260 260 Q 260 250 270 250 L 560 250 Q 570 250 580 250" stroke="#f87171" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="5,3"/>
  <text x="380" y="245" fill="#fca5a5" font-size="8">Urgent Deals</text>

  <!-- Notification → WhatsApp API -->
  <path d="M 790 248 L 800 175 Q 800 165 790 160 L 790 144" stroke="#f87171" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="810" y="175" fill="#fca5a5" font-size="8">Alert</text>

  <!-- Auth Controller → Google OAuth -->
  <path d="M 420 295 L 420 175 Q 420 165 430 165 L 555 165 Q 565 165 572 155 L 572 144" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arrowAmber)"/>

  <!-- Frontend → Backend -->
  <line x1="860" y1="480" x2="810" y2="390" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="845" y="440" fill="#c4b5fd" font-size="9">Axios HTTP</text>

  <!-- Frontend → Dashboard -->
  <path d="M 860 460 L 540 260 Q 530 255 530 245 L 530 251" stroke="#a78bfa" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)" stroke-dasharray="5,3"/>

  <!-- ═══ LEGEND ═══ -->
