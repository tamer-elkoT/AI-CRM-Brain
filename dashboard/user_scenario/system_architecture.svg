  <text x="400" y="465" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="500">📋 Pydantic Schemas (api_schemas.py) — Validates all Request/Response data</text>

  <!-- Security Utils -->
  <rect x="200" y="490" width="400" height="36" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="400" y="513" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="500">🔐 Security Utils — bcrypt hashing, JWT create/verify</text>

  <!-- ═══ DATA LAYER BOX ═══ -->
  <rect x="840" y="185" width="330" height="200" rx="12" fill="url(#dataGrad)" stroke="#f59e0b" stroke-width="1.5" opacity="0.9" filter="url(#shadow)"/>
  <text x="860" y="210" fill="#fcd34d" font-size="13" font-weight="600">🗄️  DATA LAYER</text>

