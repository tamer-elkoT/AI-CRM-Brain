version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tamerelkot
      POSTGRES_PASSWORD: "T365t14"
      POSTGRES_DB: ai_crm_brain
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "tamer.elkot.ai@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "T365t14"
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata: